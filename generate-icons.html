<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Icon Generator - DJ Lakhan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #111827;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
        }
        canvas {
            border: 2px solid rgba(168, 85, 247, 0.5);
            border-radius: 10px;
            margin: 10px;
        }
        button {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .icon-item {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PWA Icon Generator</h1>
        <p>This tool generates placeholder icons for your PWA. Replace these with your actual logo later.</p>
        
        <div>
            <button onclick="generateAllIcons()">Generate All Icons</button>
            <button onclick="downloadAll()">Download All Icons</button>
        </div>
        
        <div class="icon-grid" id="icon-grid"></div>
    </div>

    <script>
        const sizes = [16, 32, 72, 96, 128, 144, 152, 192, 384, 512];
        
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#a855f7');
            gradient.addColorStop(1, '#06b6d4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Draw music note
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('♪', size / 2, size / 2);
            
            return canvas;
        }
        
        function generateAllIcons() {
            const grid = document.getElementById('icon-grid');
            grid.innerHTML = '';
            
            sizes.forEach(size => {
                const canvas = generateIcon(size);
                const item = document.createElement('div');
                item.className = 'icon-item';
                item.innerHTML = `
                    <canvas id="icon-${size}" width="${size}" height="${size}"></canvas>
                    <p>${size}x${size}</p>
                `;
                grid.appendChild(item);
                
                const ctx = item.querySelector('canvas').getContext('2d');
                ctx.drawImage(canvas, 0, 0);
            });
        }
        
        function downloadIcon(size) {
            const canvas = generateIcon(size);
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}x${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
        
        function downloadAll() {
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    downloadIcon(size);
                }, index * 200);
            });
        }
        
        // Generate on load
        window.addEventListener('load', generateAllIcons);
    </script>
</body>
</html>
